services:
  - type: web
    name: local-market-agent
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn market_agent.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
